<style>
  :root {
    --bg: #0a0a0b;
    --card: #131316;
    --card-border: #1e1e24;
    --text: #e4e4e7;
    --text-dim: #71717a;
    --text-muted: #3f3f46;
    --accent: #34d399;
    --accent-dim: rgba(52,211,153,0.1);
    --accent-glow: rgba(52,211,153,0.15);
    --orange: #fb923c;
    --orange-dim: rgba(251,146,60,0.1);
    --blue: #60a5fa;
    --blue-dim: rgba(96,165,250,0.1);
    --purple: #a78bfa;
    --purple-dim: rgba(167,139,250,0.1);
    --rose: #fb7185;
    --rose-dim: rgba(251,113,133,0.1);
    --yellow: #facc15;
    --yellow-dim: rgba(250,204,21,0.1);
    --red: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* Top bar */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(10,10,11,0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    padding: 16px 20px 12px;
    border-bottom: 1px solid var(--card-border);
  }
  .topbar-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .app-title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: -0.5px;
  }
  .app-title span { color: var(--accent); }
  .topbar-right {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .streak-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: var(--accent-dim);
    border: 1px solid rgba(52,211,153,0.2);
    padding: 6px 12px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    color: var(--accent);
  }
  .streak-num {
    font-family: 'JetBrains Mono', monospace;
    font-size: 15px;
  }
  .icon-btn {
    background: var(--card);
    border: 1px solid var(--card-border);
    color: var(--text-dim);
    width: 36px;
    height: 36px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 16px;
    transition: all 0.2s;
  }
  .icon-btn:active, .icon-btn.active {
    background: var(--accent-dim);
    border-color: rgba(52,211,153,0.2);
    color: var(--accent);
  }

  /* Day progress */
  .day-progress { margin-top: 14px; }
  .day-progress-header {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 8px;
  }
  .day-label { font-size: 12px; color: var(--text-dim); font-weight: 500; }
  .day-pct {
    font-family: 'JetBrains Mono', monospace;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .day-track { height: 4px; background: var(--card); border-radius: 2px; overflow: hidden; }
  .day-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), #6ee7b7);
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  /* Main */
  .main { padding: 16px 16px 100px; }

  /* Now indicator */
  .now-banner {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 14px;
    background: var(--accent-dim);
    border: 1px solid rgba(52,211,153,0.15);
    border-radius: 12px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--accent);
    font-weight: 500;
  }
  .now-dot {
    width: 8px; height: 8px;
    background: var(--accent);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(52,211,153,0.4); }
    50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(52,211,153,0); }
  }

  /* Time blocks */
  .block { margin-bottom: 20px; opacity: 0.45; transition: opacity 0.3s; }
  .block.active, .block.future { opacity: 1; }
  .block.completed { opacity: 0.55; }
  .block-header {
    display: flex; align-items: center; gap: 10px;
    margin-bottom: 10px; padding-left: 2px;
  }
  .block-icon {
    width: 32px; height: 32px; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; font-size: 16px;
  }
  .block-meta { flex: 1; }
  .block-name { font-size: 15px; font-weight: 600; color: var(--text); line-height: 1.2; }
  .block-time {
    font-size: 12px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; margin-top: 1px;
  }
  .block-count {
    font-size: 12px; color: var(--text-muted);
    font-family: 'JetBrains Mono', monospace;
  }
  .block-card {
    background: var(--card);
    border: 1px solid var(--card-border);
    border-radius: 16px; overflow: hidden;
  }
  .habit {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 14px 16px;
    border-bottom: 1px solid rgba(255,255,255,0.04);
    cursor: pointer; transition: background 0.15s;
    -webkit-user-select: none; user-select: none;
  }
  .habit:last-child { border-bottom: none; }
  .habit:active { background: rgba(255,255,255,0.03); }
  .habit-check {
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 7px; border: 2px solid var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    margin-top: 1px; transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  }
  .habit.done .habit-check {
    border-color: var(--accent); background: var(--accent); transform: scale(1.1);
  }
  .habit-tick {
    opacity: 0; font-size: 12px; color: var(--bg); font-weight: 700;
    transition: opacity 0.2s, transform 0.2s; transform: scale(0.5);
  }
  .habit.done .habit-tick { opacity: 1; transform: scale(1); }
  .habit-info { flex: 1; }
  .habit-title {
    font-size: 14px; font-weight: 500; color: var(--text);
    line-height: 1.35; transition: all 0.25s;
  }
  .habit.done .habit-title { color: var(--text-muted); text-decoration: line-through; }
  .habit-why {
    font-size: 12px; color: var(--text-dim); margin-top: 3px;
    line-height: 1.35; transition: all 0.25s;
  }
  .habit.done .habit-why { color: var(--text-muted); }
  .habit-dur {
    font-size: 11px; font-family: 'JetBrains Mono', monospace;
    color: var(--text-muted); margin-top: 1px; white-space: nowrap; align-self: center;
  }

  /* Block colors */
  .block[data-color="green"] .block-icon { background: var(--accent-dim); }
  .block[data-color="orange"] .block-icon { background: var(--orange-dim); }
  .block[data-color="blue"] .block-icon { background: var(--blue-dim); }
  .block[data-color="purple"] .block-icon { background: var(--purple-dim); }
  .block[data-color="rose"] .block-icon { background: var(--rose-dim); }
  .block[data-color="green"] .block-name { color: var(--accent); }
  .block[data-color="orange"] .block-name { color: var(--orange); }
  .block[data-color="blue"] .block-name { color: var(--blue); }
  .block[data-color="purple"] .block-name { color: var(--purple); }
  .block[data-color="rose"] .block-name { color: var(--rose); }

  /* Bottom bar */
  .bottombar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(10,10,11,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    border-top: 1px solid var(--card-border);
    padding: 12px 20px;
    padding-bottom: max(12px, env(safe-area-inset-bottom));
    display: flex; justify-content: space-between; align-items: center;
    z-index: 100;
  }
  .bottom-btn {
    background: none; border: none; color: var(--text-dim);
    font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500;
    cursor: pointer; padding: 8px 12px; border-radius: 8px; transition: all 0.15s;
  }
  .bottom-btn:active { background: var(--card); }
  .complete-btn {
    background: var(--accent-dim); border: 1px solid rgba(52,211,153,0.2);
    color: var(--accent); font-weight: 600; font-size: 13px;
    padding: 10px 20px; border-radius: 10px; transition: all 0.2s;
  }
  .complete-btn:active { background: rgba(52,211,153,0.2); }
  .complete-btn:disabled { opacity: 0.3; pointer-events: none; }

  /* Celebration */
  .celebration {
    position: fixed; inset: 0;
    background: rgba(10,10,11,0.95);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    z-index: 200; opacity: 0; pointer-events: none; transition: opacity 0.4s;
  }
  .celebration.show { opacity: 1; pointer-events: all; }
  .celeb-emoji { font-size: 56px; margin-bottom: 16px; }
  .celeb-title { font-size: 24px; font-weight: 700; color: var(--accent); margin-bottom: 6px; }
  .celeb-sub { font-size: 14px; color: var(--text-dim); margin-bottom: 8px; }
  .celeb-best { font-size: 12px; color: var(--text-muted); margin-bottom: 28px; }
  .celeb-btn {
    background: var(--accent); color: var(--bg); border: none;
    font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 600;
    padding: 14px 36px; border-radius: 12px; cursor: pointer;
  }

  /* ── Panel (shared by history & settings) ── */
  .panel {
    position: fixed; inset: 0; z-index: 150;
    background: rgba(10,10,11,0.97);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    opacity: 0; pointer-events: none; transition: opacity 0.3s;
    overflow-y: auto; padding: 0 16px 32px;
  }
  .panel.show { opacity: 1; pointer-events: all; }
  .panel-header {
    position: sticky; top: 0; z-index: 10;
    background: rgba(10,10,11,0.9);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    padding: 20px 0 16px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .panel-title { font-size: 18px; font-weight: 700; }
  .panel-close {
    background: var(--card); border: 1px solid var(--card-border);
    color: var(--text-dim); width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 18px;
  }

  /* ── Stats ── */
  .stats-row {
    display: grid; grid-template-columns: 1fr 1fr 1fr;
    gap: 10px; margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 14px; padding: 14px; text-align: center;
  }
  .stat-value {
    font-family: 'JetBrains Mono', monospace;
    font-size: 22px; font-weight: 700; color: var(--accent); line-height: 1.2;
  }
  .stat-value.orange { color: var(--orange); }
  .stat-value.blue { color: var(--blue); }
  .stat-label { font-size: 11px; color: var(--text-dim); margin-top: 4px; font-weight: 500; }

  /* Calendar */
  .cal-nav {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .cal-month { font-size: 15px; font-weight: 600; }
  .cal-arrow {
    background: var(--card); border: 1px solid var(--card-border);
    color: var(--text-dim); width: 32px; height: 32px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; font-size: 14px;
  }
  .cal-arrow:active { background: var(--card-border); }
  .cal-grid {
    display: grid; grid-template-columns: repeat(7, 1fr);
    gap: 4px; margin-bottom: 24px;
  }
  .cal-dow {
    text-align: center; font-size: 11px; color: var(--text-muted);
    font-weight: 500; padding: 6px 0;
  }
  .cal-day {
    aspect-ratio: 1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    border-radius: 10px; font-size: 13px;
    font-family: 'JetBrains Mono', monospace; color: var(--text-dim);
    cursor: pointer; transition: all 0.15s; position: relative; gap: 2px;
  }
  .cal-day.empty { cursor: default; }
  .cal-day.today { border: 1px solid rgba(52,211,153,0.3); color: var(--accent); font-weight: 700; }
  .cal-day.selected { background: var(--accent-dim); border: 1px solid rgba(52,211,153,0.3); }
  .cal-day.future { color: var(--text-muted); cursor: default; opacity: 0.4; }
  .cal-dot { width: 5px; height: 5px; border-radius: 50%; }
  .cal-dot.full { background: var(--accent); }
  .cal-dot.partial { background: var(--yellow); }
  .cal-dot.none { background: var(--text-muted); opacity: 0.3; }

  /* Day detail */
  .day-detail {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; padding: 16px;
  }
  .day-detail-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px;
  }
  .day-detail-title { font-size: 14px; font-weight: 600; }
  .day-detail-pct {
    font-family: 'JetBrains Mono', monospace; font-size: 13px;
    color: var(--accent); font-weight: 500;
  }
  .day-detail-block { margin-bottom: 12px; }
  .day-detail-block:last-child { margin-bottom: 0; }
  .day-detail-block-name { font-size: 12px; font-weight: 600; margin-bottom: 6px; }
  .day-detail-habit { display: flex; align-items: center; gap: 8px; padding: 5px 0; font-size: 13px; }
  .day-detail-check {
    width: 16px; height: 16px; min-width: 16px; border-radius: 5px;
    border: 2px solid var(--text-muted);
    display: flex; align-items: center; justify-content: center;
    font-size: 9px; color: var(--bg); font-weight: 700;
  }
  .day-detail-check.done { border-color: var(--accent); background: var(--accent); }
  .day-detail-habit-title { color: var(--text-dim); }
  .day-detail-habit.done .day-detail-habit-title { color: var(--text); }

  /* Heatmap */
  .heatmap-section { margin-bottom: 24px; }
  .heatmap-label { font-size: 13px; font-weight: 600; margin-bottom: 10px; color: var(--text-dim); }
  .heatmap-row { display: flex; gap: 3px; flex-wrap: wrap; }
  .heatmap-cell {
    width: 14px; height: 14px; border-radius: 3px;
    background: var(--card); border: 1px solid var(--card-border);
  }
  .heatmap-cell.l1 { background: rgba(52,211,153,0.15); border-color: rgba(52,211,153,0.1); }
  .heatmap-cell.l2 { background: rgba(52,211,153,0.3); border-color: rgba(52,211,153,0.2); }
  .heatmap-cell.l3 { background: rgba(52,211,153,0.5); border-color: rgba(52,211,153,0.3); }
  .heatmap-cell.l4 { background: var(--accent); border-color: var(--accent); }

  /* ── Settings panel ── */
  .settings-section { margin-bottom: 24px; }
  .settings-section-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 12px;
  }

  .sblock {
    background: var(--card); border: 1px solid var(--card-border);
    border-radius: 16px; margin-bottom: 12px; overflow: hidden;
  }
  .sblock-header {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px; cursor: pointer; transition: background 0.15s;
  }
  .sblock-header:active { background: rgba(255,255,255,0.02); }
  .sblock-icon { font-size: 18px; width: 28px; text-align: center; }
  .sblock-info { flex: 1; }
  .sblock-name { font-size: 14px; font-weight: 600; }
  .sblock-time {
    font-size: 11px; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace; margin-top: 2px;
  }
  .sblock-chevron {
    font-size: 14px; color: var(--text-muted);
    transition: transform 0.2s;
  }
  .sblock.open .sblock-chevron { transform: rotate(90deg); }

  .sblock-body {
    max-height: 0; overflow: hidden; transition: max-height 0.3s ease;
  }
  .sblock.open .sblock-body { max-height: 2000px; }

  .sblock-body-inner {
    padding: 0 16px 16px;
    border-top: 1px solid var(--card-border);
  }

  /* Block edit form */
  .sform { padding-top: 14px; }
  .sform-row {
    display: flex; gap: 10px; margin-bottom: 10px; align-items: center;
  }
  .sform-field { flex: 1; }
  .sform-label {
    font-size: 11px; color: var(--text-dim); font-weight: 500; margin-bottom: 4px;
  }
  .sform-input {
    width: 100%; background: var(--bg); border: 1px solid var(--card-border);
    color: var(--text); border-radius: 8px; padding: 8px 10px;
    font-family: 'DM Sans', sans-serif; font-size: 13px;
    outline: none; transition: border-color 0.2s;
  }
  .sform-input:focus { border-color: var(--accent); }
  .sform-input-sm { width: 60px; text-align: center; }

  /* Color picker */
  .color-picks { display: flex; gap: 8px; }
  .color-pick {
    width: 28px; height: 28px; border-radius: 8px; cursor: pointer;
    border: 2px solid transparent; transition: all 0.15s;
    display: flex; align-items: center; justify-content: center;
  }
  .color-pick.selected { border-color: var(--text); transform: scale(1.15); }
  .color-pick[data-c="green"] { background: var(--accent); }
  .color-pick[data-c="orange"] { background: var(--orange); }
  .color-pick[data-c="blue"] { background: var(--blue); }
  .color-pick[data-c="purple"] { background: var(--purple); }
  .color-pick[data-c="rose"] { background: var(--rose); }

  /* Habit rows in settings */
  .shabit {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid rgba(255,255,255,0.04);
  }
  .shabit:last-child { border-bottom: none; }
  .shabit-info { flex: 1; min-width: 0; }
  .shabit-title { font-size: 13px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shabit-why { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .shabit-actions { display: flex; gap: 4px; flex-shrink: 0; }
  .shabit-btn {
    background: none; border: none; color: var(--text-muted); cursor: pointer;
    width: 28px; height: 28px; border-radius: 6px; font-size: 13px;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .shabit-btn:active { background: var(--card-border); }
  .shabit-btn.del:active { color: var(--red); }

  /* Add buttons */
  .add-btn {
    display: flex; align-items: center; justify-content: center; gap: 6px;
    width: 100%; padding: 10px; margin-top: 10px;
    background: var(--accent-dim); border: 1px dashed rgba(52,211,153,0.25);
    border-radius: 10px; color: var(--accent); font-family: 'DM Sans', sans-serif;
    font-size: 13px; font-weight: 500; cursor: pointer; transition: all 0.15s;
  }
  .add-btn:active { background: rgba(52,211,153,0.15); }

  .add-block-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;

<script>
// ═══════════════════════════════════════
// DEFAULT TEMPLATE
// ═══════════════════════════════════════
const DEFAULT_BLOCKS = [

    ]
  },
  {
    id: 'commute_pm', name: 'Evening Commute', icon: '🌆', color: 'purple',
    startHour: 20.5, endHour: 22.5,
    habits: [
      { id: 'e1', title: 'Listen to 1 skill-building video/podcast', why: 'Coding, automation, or AML trends', dur: '25m' },
      { id: 'e2', title: 'Plan tomorrow\'s Instagram reel idea', why: 'Capture 1 idea while mind is fresh', dur: '5m' },
      { id: 'e3', title: 'Internal day review (mentally)', why: 'What worked? What didn\'t? No journal needed', dur: '5m' },
    ]
  },
  {
    id: 'night', name: 'Night Shutdown', icon: '🌙', color: 'rose',
    startHour: 22.5, endHour: 24,
    habits: [
      { id: 'n1', title: 'Write 1 win from today', why: 'Proof that you showed up', dur: '1m' },
      { id: 'n2', title: 'Set tomorrow\'s clothes out', why: 'Kill morning decision fatigue', dur: '2m' },
      { id: 'n3', title: 'Phone on charger, away from bed', why: 'Breaks the scroll-before-sleep loop', dur: '1m' },
    ]
  }
];

const COLORS = ['green', 'orange', 'blue', 'purple', 'rose'];
const COLOR_MAP = {
  green: 'var(--accent)', orange: 'var(--orange)', blue: 'var(--blue)',
  purple: 'var(--purple)', rose: 'var(--rose)'
};

// ═══════════════════════════════════════
// BLOCK CONFIG (localStorage-backed)
// ═══════════════════════════════════════
function getBlocks() {
  try {
    const stored = localStorage.getItem('hs-blocks');
    if (stored) return JSON.parse(stored);
  } catch {}
  return JSON.parse(JSON.stringify(DEFAULT_BLOCKS));
}

function saveBlocks(b) {
  localStorage.setItem('hs-blocks', JSON.stringify(b));
}

function getAllHabitIds() {
  return getBlocks().flatMap(b => b.habits.map(h => h.id));
}

function genId() {
  return 'h' + Date.now().toString(36) + Math.random().toString(36).slice(2, 5);
}

// ═══════════════════════════════════════
// STATE
// ═══════════════════════════════════════
function todayKey() {
  const d = new Date();
  return `hs-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function dateToKey(d) {
  return `hs-${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function getState(key) {
  try { return JSON.parse(localStorage.getItem(key || todayKey()) || '{}'); } catch { return {}; }
}
function saveState(s) { localStorage.setItem(todayKey(), JSON.stringify(s)); }
function getStreak() {
  try { return JSON.parse(localStorage.getItem('hs-streak') || '{"count":0,"lastDate":"","best":0}'); }
  catch { return { count: 0, lastDate: '', best: 0 }; }
}
function saveStreak(s) { localStorage.setItem('hs-streak', JSON.stringify(s)); }

// ═══════════════════════════════════════
// TIME UTILS
// ═══════════════════════════════════════
function getCurrentHour() {
  const now = new Date();
  return now.getHours() + now.getMinutes() / 60;
}
function hourToTimeStr(h) {
  const hrs = Math.floor(h);
  const mins = Math.round((h - hrs) * 60);
  return `${String(hrs).padStart(2,'0')}:${String(mins).padStart(2,'0')}`;
}
function timeStrToHour(t) {
  const [h, m] = t.split(':').map(Number);
  return h + m / 60;
}
function formatTime12(h) {
  const hrs = Math.floor(h % 24);
  const mins = Math.round((h - Math.floor(h)) * 60);
  const period = hrs >= 12 ? 'PM' : 'AM';
  const display = hrs > 12 ? hrs - 12 : (hrs === 0 ? 12 : hrs);
  return `${display}:${String(mins).padStart(2,'0')} ${period}`;
}
function blockTimeLabel(b) {
  if (b.endHour >= 24) return `${formatTime12(b.startHour)} – Sleep`;
  return `${formatTime12(b.startHour)} – ${formatTime12(b.endHour)}`;
}

function getActiveBlockId() {
  const h = getCurrentHour();
  const blocks = getBlocks();
  for (const b of blocks) {
    if (h >= b.startHour && h < b.endHour) return b.id;
  }
  return blocks[blocks.length - 1].id;
}
function getBlockStatus(block, state) {
  const h = getCurrentHour();
  const allDone = block.habits.every(hab => state[hab.id]);
  if (allDone && block.habits.length > 0) return 'completed';
  if (h >= block.startHour && h < block.endHour) return 'active';
  if (h < block.startHour) return 'future';
  return 'past';
}

// ═══════════════════════════════════════
// HAPTIC & TOAST
// ═══════════════════════════════════════
function haptic(style) {
  if (!navigator.vibrate) return;
  if (style === 'light') navigator.vibrate(10);
  else if (style === 'medium') navigator.vibrate(20);
  else if (style === 'success') navigator.vibrate([15, 50, 15]);
}

let toastTimer = null;
function showToast(msg, opts = {}) {
  const toast = document.getElementById('toast');
  document.getElementById('toastMsg').textContent = msg;
  document.getElementById('toastUndo').style.display = opts.undo ? 'inline' : 'none';
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), opts.duration || 3000);
}

let resetBackup = null;
function undoReset() {
  if (!resetBackup) return;
  localStorage.setItem(todayKey(), resetBackup);
  resetBackup = null;
  document.getElementById('toast').classList.remove('show');
  render();
  showToast('Restored');
  haptic('success');
}

// ═══════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════
function render() {
  const blocks = getBlocks();
  const state = getState();
  const allIds = blocks.flatMap(b => b.habits.map(h => h.id));
  const totalHabits = allIds.length;
  const doneHabits = allIds.filter(id => state[id]).length;
  const pct = totalHabits > 0 ? Math.round((doneHabits / totalHabits) * 100) : 0;

  const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const now = new Date();
  document.getElementById('dayLabel').textContent = `${days[now.getDay()]}, ${now.getDate()} ${months[now.getMonth()]}`;
  document.getElementById('dayPct').textContent = `${pct}%`;
  document.getElementById('dayFill').style.width = `${pct}%`;

  const streak = getStreak();
  document.getElementById('streakNum').textContent = streak.count;
  document.getElementById('completeBtn').disabled = doneHabits < totalHabits || totalHabits === 0;

  const activeId = getActiveBlockId();
  let html = '';

  const activeBlock = blocks.find(b => b.id === activeId);
  if (activeBlock) {
    html += `<div class="now-banner"><div class="now-dot"></div>Now: ${activeBlock.name} block</div>`;
  }

  blocks.forEach(block => {
    const status = getBlockStatus(block, state);
    const blockDone = block.habits.filter(h => state[h.id]).length;

    html += `<div class="block ${status}" data-color="${block.color}" data-id="${block.id}">`;
    html += `<div class="block-header">`;
    html += `<div class="block-icon">${block.icon}</div>`;
    html += `<div class="block-meta">`;
    html += `<div class="block-name">${block.name}</div>`;
    html += `<div class="block-time">${blockTimeLabel(block)}</div>`;
    html += `</div>`;
    html += `<div class="block-count">${blockDone}/${block.habits.length}</div>`;
    html += `</div>`;
    html += `<div class="block-card">`;

    if (block.habits.length === 0) {
      html += `<div style="padding:20px;text-align:center;color:var(--text-muted);font-size:13px;">No habits yet — tap ⚙️ to add some</div>`;
    }

    block.habits.forEach(hab => {
      const done = state[hab.id] ? 'done' : '';
      html += `<div class="habit ${done}" data-habit="${hab.id}" onclick="toggleHabit('${hab.id}', this)">`;
      html += `<div class="habit-check"><span class="habit-tick">✓</span></div>`;
      html += `<div class="habit-info">`;
      html += `<div class="habit-title">${hab.title}</div>`;
      html += `<div class="habit-why">${hab.why}</div>`;
      html += `</div>`;
      html += `<div class="habit-dur">${hab.dur}</div>`;
      html += `</div>`;
    });
    html += `</div></div>`;
  });

  document.getElementById('main').innerHTML = html;

  if (!window._scrolled) {
    window._scrolled = true;
    setTimeout(() => {
      const activeEl = document.querySelector('.block.active');
      if (activeEl) activeEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 300);
  }
}

function toggleHabit(id, el) {
  const state = getState();
  const blocks = getBlocks();
  state[id] = !state[id];
  saveState(state);
  haptic('light');

  if (el) {
    el.classList.toggle('done', state[id]);
    const blockEl = el.closest('.block');
    const blockId = blockEl.dataset.id;
    const block = blocks.find(b => b.id === blockId);
    const blockDone = block.habits.filter(h => state[h.id]).length;
    blockEl.querySelector('.block-count').textContent = `${blockDone}/${block.habits.length}`;
    const status = getBlockStatus(block, state);
    blockEl.className = `block ${status}`;
    blockEl.setAttribute('data-color', block.color);
    blockEl.setAttribute('data-id', block.id);

    const allIds = blocks.flatMap(b => b.habits.map(h => h.id));
    const doneHabits = allIds.filter(hid => state[hid]).length;
    const pct = Math.round((doneHabits / allIds.length) * 100);
    document.getElementById('dayPct').textContent = `${pct}%`;
    document.getElementById('dayFill').style.width = `${pct}%`;
    document.getElementById('completeBtn').disabled = doneHabits < allIds.length;
    if (doneHabits === allIds.length) haptic('success');
  } else {
    render();
  }
}

function resetToday() {
  const current = localStorage.getItem(todayKey());
  if (!current || current === '{}') return;
  resetBackup = current;
  localStorage.removeItem(todayKey());
  render();
  haptic('medium');
  showToast('Day reset', { undo: true, duration: 5000 });
}

function completeDay() {
  const streak = getStreak();
  const today = todayKey();
  const yesterday = (() => {
    const d = new Date(); d.setDate(d.getDate() - 1);
    return dateToKey(d);
  })();

  if (streak.lastDate === today) return;
  if (streak.lastDate === yesterday) streak.count++;
  else streak.count = 1;
  streak.lastDate = today;
  if (!streak.best || streak.count > streak.best) streak.best = streak.count;
  saveStreak(streak);

  document.getElementById('celebSub').textContent = `Streak: ${streak.count} day${streak.count > 1 ? 's' : ''}`;
  document.getElementById('celebBest').textContent = streak.count >= streak.best && streak.count > 1
    ? '🎉 New personal best!' : `Personal best: ${streak.best} day${streak.best > 1 ? 's' : ''}`;
  document.getElementById('celebration').classList.add('show');
  haptic('success');
  spawnConfetti();
  render();
}

function closeCeleb() { document.getElementById('celebration').classList.remove('show'); }

function spawnConfetti() {
  const colors = ['#34d399', '#fb923c', '#60a5fa', '#a78bfa', '#fb7185', '#facc15'];
  for (let i = 0; i < 40; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDuration = (1.5 + Math.random() * 2) + 's';
    el.style.animationDelay = Math.random() * 0.5 + 's';
    el.style.width = (6 + Math.random() * 6) + 'px';
    el.style.height = (6 + Math.random() * 6) + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

// ═══════════════════════════════════════
// HISTORY & STATS
// ═══════════════════════════════════════
let historyMonth = new Date().getMonth();
let historyYear = new Date().getFullYear();
let selectedDate = null;

function toggleHistory() {
  const panel = document.getElementById('historyPanel');
  const btn = document.getElementById('historyToggle');
  const isOpen = panel.classList.contains('show');
  panel.classList.toggle('show');
  btn.classList.toggle('active');
  if (!isOpen) {
    historyMonth = new Date().getMonth();
    historyYear = new Date().getFullYear();
    selectedDate = null;
    renderHistory();
  }
}

function getDayCompletion(dateObj) {
  const key = dateToKey(dateObj);
  const state = getState(key);
  const allIds = getAllHabitIds();
  const total = allIds.length;
  const done = allIds.filter(id => state[id]).length;
  return { done, total, pct: total > 0 ? Math.round((done / total) * 100) : 0 };
}

function renderHistory() { renderStats(); renderCalendar(); renderDayDetail(); }

function renderStats() {
  const streak = getStreak();
  const now = new Date();
  const dayOfWeek = now.getDay();
  const mondayOffset = dayOfWeek === 0 ? -6 : 1 - dayOfWeek;
  const monday = new Date(now);
  monday.setDate(now.getDate() + mondayOffset);
  monday.setHours(0, 0, 0, 0);

  let weekDays = 0, weekDone = 0, weekTotal = 0, perfectDays = 0;
  for (let i = 0; i < 7; i++) {
    const d = new Date(monday); d.setDate(monday.getDate() + i);
    if (d > now) break;
    weekDays++;
    const comp = getDayCompletion(d);
    weekDone += comp.done;
    weekTotal += comp.total;
    if (comp.done === comp.total && comp.total > 0) perfectDays++;
  }
  const weekPct = weekTotal > 0 ? Math.round((weekDone / weekTotal) * 100) : 0;

  let heatmapHtml = '<div class="heatmap-section"><div class="heatmap-label">Last 60 days</div><div class="heatmap-row">';
  for (let i = 59; i >= 0; i--) {
    const d = new Date(now); d.setDate(now.getDate() - i);
    const comp = getDayCompletion(d);
    let level = '';
    if (comp.done > 0) {
      if (comp.pct <= 25) level = 'l1';
      else if (comp.pct <= 50) level = 'l2';
      else if (comp.pct <= 99) level = 'l3';
      else level = 'l4';
    }
    heatmapHtml += `<div class="heatmap-cell ${level}" title="${d.toLocaleDateString()}: ${comp.pct}%"></div>`;
  }
  heatmapHtml += '</div></div>';

  document.getElementById('statsContent').innerHTML = `
    <div class="stats-row">
      <div class="stat-card"><div class="stat-value">${weekPct}%</div><div class="stat-label">This week</div></div>
      <div class="stat-card"><div class="stat-value orange">${perfectDays}/${weekDays}</div><div class="stat-label">Perfect days</div></div>
      <div class="stat-card"><div class="stat-value blue">${streak.best || streak.count}</div><div class="stat-label">Best streak</div></div>
    </div>${heatmapHtml}`;
}

function renderCalendar() {
  const monthNames = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const now = new Date();
  const daysInMonth = new Date(historyYear, historyMonth + 1, 0).getDate();
  const startDay = new Date(historyYear, historyMonth, 1).getDay();
  const canFwd = historyYear < now.getFullYear() || (historyYear === now.getFullYear() && historyMonth < now.getMonth());

  let html = `<div class="cal-nav">
    <button class="cal-arrow" onclick="calPrev()">‹</button>
    <div class="cal-month">${monthNames[historyMonth]} ${historyYear}</div>
    <button class="cal-arrow" onclick="calNext()" ${canFwd ? '' : 'style="opacity:0.3;pointer-events:none"'}>›</button>
  </div><div class="cal-grid">
    <div class="cal-dow">Su</div><div class="cal-dow">Mo</div><div class="cal-dow">Tu</div>
    <div class="cal-dow">We</div><div class="cal-dow">Th</div><div class="cal-dow">Fr</div><div class="cal-dow">Sa</div>`;

  for (let i = 0; i < startDay; i++) html += '<div class="cal-day empty"></div>';
  for (let day = 1; day <= daysInMonth; day++) {
    const d = new Date(historyYear, historyMonth, day);
    const isToday = d.toDateString() === now.toDateString();
    const isFuture = d > now;
    const isSelected = selectedDate && d.toDateString() === selectedDate.toDateString();
    const comp = isFuture ? { done: 0, pct: 0 } : getDayCompletion(d);
    let dotClass = 'none';
    if (!isFuture && comp.done > 0) dotClass = comp.pct === 100 ? 'full' : 'partial';
    let cls = 'cal-day';
    if (isToday) cls += ' today';
    if (isFuture) cls += ' future';
    if (isSelected) cls += ' selected';
    const click = isFuture ? '' : `onclick="selectDay(${historyYear},${historyMonth},${day})"`;
    html += `<div class="${cls}" ${click}>${day}${isFuture ? '' : `<div class="cal-dot ${dotClass}"></div>`}</div>`;
  }
  html += '</div>';
  document.getElementById('calendarContent').innerHTML = html;
}

function calPrev() { historyMonth--; if (historyMonth < 0) { historyMonth = 11; historyYear--; } selectedDate = null; renderCalendar(); renderDayDetail(); }
function calNext() { const n = new Date(); if (historyYear === n.getFullYear() && historyMonth >= n.getMonth()) return; historyMonth++; if (historyMonth > 11) { historyMonth = 0; historyYear++; } selectedDate = null; renderCalendar(); renderDayDetail(); }
function selectDay(y, m, d) { selectedDate = new Date(y, m, d); renderCalendar(); renderDayDetail(); }

function renderDayDetail() {
  const container = document.getElementById('dayDetailContent');
  if (!selectedDate) { container.innerHTML = ''; return; }
  const blocks = getBlocks();
  const dayNames = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  const state = getState(dateToKey(selectedDate));
  const allIds = blocks.flatMap(b => b.habits.map(h => h.id));
  const done = allIds.filter(id => state[id]).length;
  const pct = allIds.length > 0 ? Math.round((done / allIds.length) * 100) : 0;

  let html = `<div class="day-detail"><div class="day-detail-header">
    <div class="day-detail-title">${dayNames[selectedDate.getDay()]}, ${selectedDate.getDate()} ${monthNames[selectedDate.getMonth()]} ${selectedDate.getFullYear()}</div>
    <div class="day-detail-pct">${pct}%</div></div>`;
  blocks.forEach(block => {
    const bd = block.habits.filter(h => state[h.id]).length;
    html += `<div class="day-detail-block"><div class="day-detail-block-name" style="color:${COLOR_MAP[block.color]}">${block.icon} ${block.name} (${bd}/${block.habits.length})</div>`;
    block.habits.forEach(hab => {
      const d = state[hab.id];
      html += `<div class="day-detail-habit ${d ? 'done' : ''}"><div class="day-detail-check ${d ? 'done' : ''}">${d ? '✓' : ''}</div><div class="day-detail-habit-title">${hab.title}</div></div>`;
    });
    html += '</div>';
  });
  html += '</div>';
  container.innerHTML = html;
}

// ═══════════════════════════════════════
// SETTINGS PANEL
// ═══════════════════════════════════════
let openBlockId = null;

function toggleSettings() {
  const panel = document.getElementById('settingsPanel');
  const btn = document.getElementById('settingsToggle');
  const isOpen = panel.classList.contains('show');
  panel.classList.toggle('show');
  btn.classList.toggle('active');
  if (!isOpen) renderSettings();
}

function renderSettings() {
  const blocks = getBlocks();
  let html = '<div class="settings-section"><div class="settings-section-label">Your Habit Stacks</div>';

  blocks.forEach((block, bi) => {
    const isOpen = openBlockId === block.id;
    html += `<div class="sblock ${isOpen ? 'open' : ''}" data-sid="${block.id}">`;
    html += `<div class="sblock-header" onclick="toggleSettingsBlock('${block.id}')">`;
    html += `<div class="sblock-icon">${block.icon}</div>`;
    html += `<div class="sblock-info">`;
    html += `<div class="sblock-name" style="color:${COLOR_MAP[block.color]}">${block.name}</div>`;
    html += `<div class="sblock-time">${blockTimeLabel(block)} · ${block.habits.length} habit${block.habits.length !== 1 ? 's' : ''}</div>`;
    html += `</div>`;
    html += `<div class="sblock-actions">`;
    html += `<button class="sblock-move" onclick="event.stopPropagation();moveBlock(${bi},-1)" ${bi === 0 ? 'disabled' : ''} title="Move up">▲</button>`;
    html += `<button class="sblock-move" onclick="event.stopPropagation();moveBlock(${bi},1)" ${bi === blocks.length - 1 ? 'disabled' : ''} title="Move down">▼</button>`;
    html += `</div>`;
    html += `<div class="sblock-chevron">›</div>`;
    html += `</div>`; // header

    html += `<div class="sblock-body"><div class="sblock-body-inner">`;

    // Block edit form
    html += `<div class="sform">`;
    html += `<div class="sform-row">`;
    html += `<div class="sform-field" style="flex:0 0 60px;"><div class="sform-label">Icon</div><input class="sform-input sform-input-sm" value="${block.icon}" onchange="updateBlock('${block.id}','icon',this.value)"></div>`;
    html += `<div class="sform-field"><div class="sform-label">Name</div><input class="sform-input" value="${escAttr(block.name)}" onchange="updateBlock('${block.id}','name',this.value)"></div>`;
    html += `</div>`;
    html += `<div class="sform-row">`;
    html += `<div class="sform-field"><div class="sform-label">Start</div><input type="time" class="sform-input" value="${hourToTimeStr(block.startHour)}" onchange="updateBlock('${block.id}','startHour',this.value)"></div>`;
    html += `<div class="sform-field"><div class="sform-label">End</div><input type="time" class="sform-input" value="${hourToTimeStr(block.endHour >= 24 ? 23.99 : block.endHour)}" onchange="updateBlock('${block.id}','endHour',this.value)"></div>`;
    html += `</div>`;
    html += `<div class="sform-row"><div class="sform-field"><div class="sform-label">Color</div><div class="color-picks">`;
    COLORS.forEach(c => {
      html += `<div class="color-pick ${c === block.color ? 'selected' : ''}" data-c="${c}" onclick="updateBlock('${block.id}','color','${c}')"></div>`;
    });
    html += `</div></div></div>`;
    html += `</div>`; // sform

    // Habits list
    block.habits.forEach((hab, hi) => {
      html += `<div class="shabit">`;
      html += `<div class="shabit-info">`;
      html += `<div class="shabit-title">${hab.title}</div>`;
      html += `<div class="shabit-why">${hab.why || ''} ${hab.dur ? '· ' + hab.dur : ''}</div>`;
      html += `</div>`;
      html += `<div class="shabit-actions">`;
      html += `<button class="shabit-btn" onclick="moveHabit('${block.id}',${hi},-1)" ${hi === 0 ? 'style="opacity:0.2"' : ''} title="Move up">▲</button>`;
      html += `<button class="shabit-btn" onclick="moveHabit('${block.id}',${hi},1)" ${hi === block.habits.length - 1 ? 'style="opacity:0.2"' : ''} title="Move down">▼</button>`;
      html += `<button class="shabit-btn" onclick="editHabit('${block.id}','${hab.id}')" title="Edit">✎</button>`;
      html += `<button class="shabit-btn del" onclick="deleteHabit('${block.id}','${hab.id}')" title="Delete">✕</button>`;
      html += `</div></div>`;
    });

    html += `<button class="add-btn" onclick="addHabit('${block.id}')">+ Add habit</button>`;
    html += `<button class="danger-btn" style="margin-top:10px;" onclick="deleteBlock('${block.id}')">Delete this block</button>`;
    html += `</div></div>`; // body
    html += `</div>`; // sblock
  });

  html += `<button class="add-block-btn" onclick="addBlock()">+ Add new block</button>`;
  html += `</div>`; // section

  html += `<div class="settings-section">`;
  html += `<div class="settings-section-label">Templates</div>`;
  html += `<button class="danger-btn" onclick="resetToDefaults()">Reset to default template</button>`;
  html += `</div>`;

  document.getElementById('settingsContent').innerHTML = html;
}

function escAttr(s) { return s.replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }

function toggleSettingsBlock(id) {
  openBlockId = openBlockId === id ? null : id;
  renderSettings();
}

// ── Block CRUD ──
function updateBlock(blockId, field, value) {
  const blocks = getBlocks();
  const block = blocks.find(b => b.id === blockId);
  if (!block) return;
  if (field === 'startHour' || field === 'endHour') {
    block[field] = timeStrToHour(value);
  } else {
    block[field] = value;
  }
  saveBlocks(blocks);
  renderSettings();
  render();
}

function moveBlock(index, dir) {
  const blocks = getBlocks();
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= blocks.length) return;
  [blocks[index], blocks[newIndex]] = [blocks[newIndex], blocks[index]];
  saveBlocks(blocks);
  renderSettings();
  render();
}

function addBlock() {
  const blocks = getBlocks();
  const id = 'b' + genId();
  blocks.push({
    id, name: 'New Block', icon: '⚡', color: 'green',
    startHour: 9, endHour: 10, habits: []
  });
  saveBlocks(blocks);
  openBlockId = id;
  renderSettings();
  render();
  showToast('Block added');
}

function deleteBlock(blockId) {
  if (!confirm('Delete this entire block and its habits?')) return;
  const blocks = getBlocks().filter(b => b.id !== blockId);
  saveBlocks(blocks);
  openBlockId = null;
  renderSettings();
  render();
  showToast('Block deleted');
}

// ── Habit CRUD ──
let editingHabitBlockId = null;
let editingHabitId = null;

function addHabit(blockId) {
  editingHabitBlockId = blockId;
  editingHabitId = null;
  document.getElementById('habitModalTitle').textContent = 'Add Habit';
  document.getElementById('hm_title').value = '';
  document.getElementById('hm_why').value = '';
  document.getElementById('hm_dur').value = '';
  document.getElementById('habitModal').classList.add('show');
}

function editHabit(blockId, habitId) {
  const blocks = getBlocks();
  const block = blocks.find(b => b.id === blockId);
  const habit = block?.habits.find(h => h.id === habitId);
  if (!habit) return;
  editingHabitBlockId = blockId;
  editingHabitId = habitId;
  document.getElementById('habitModalTitle').textContent = 'Edit Habit';
  document.getElementById('hm_title').value = habit.title;
  document.getElementById('hm_why').value = habit.why;
  document.getElementById('hm_dur').value = habit.dur;
  document.getElementById('habitModal').classList.add('show');
}

function closeHabitModal() {
  document.getElementById('habitModal').classList.remove('show');
}

function saveHabitModal() {
  const title = document.getElementById('hm_title').value.trim();
  if (!title) { showToast('Title is required'); return; }
  const why = document.getElementById('hm_why').value.trim();
  const dur = document.getElementById('hm_dur').value.trim();
  const blocks = getBlocks();
  const block = blocks.find(b => b.id === editingHabitBlockId);
  if (!block) return;

  if (editingHabitId) {
    // Edit existing
    const habit = block.habits.find(h => h.id === editingHabitId);
    if (habit) { habit.title = title; habit.why = why; habit.dur = dur; }
  } else {
    // Add new
    block.habits.push({ id: genId(), title, why, dur });
  }
  saveBlocks(blocks);
  closeHabitModal();
  renderSettings();
  render();
  showToast(editingHabitId ? 'Habit updated' : 'Habit added');
}

function deleteHabit(blockId, habitId) {
  if (!confirm('Delete this habit?')) return;
  const blocks = getBlocks();
  const block = blocks.find(b => b.id === blockId);
  if (!block) return;
  block.habits = block.habits.filter(h => h.id !== habitId);
  saveBlocks(blocks);
  renderSettings();
  render();
  showToast('Habit deleted');
}

function moveHabit(blockId, index, dir) {
  const blocks = getBlocks();
  const block = blocks.find(b => b.id === blockId);
  if (!block) return;
  const newIndex = index + dir;
  if (newIndex < 0 || newIndex >= block.habits.length) return;
  [block.habits[index], block.habits[newIndex]] = [block.habits[newIndex], block.habits[index]];
  saveBlocks(blocks);
  renderSettings();
}

function resetToDefaults() {
  if (!confirm('This will replace all your custom stacks with the default template. Your tracking data will be kept. Continue?')) return;
  localStorage.removeItem('hs-blocks');
  openBlockId = null;
  renderSettings();
  render();
  showToast('Restored default template');
  haptic('success');
}

// ═══════════════════════════════════════
// EXPORT / IMPORT
// ═══════════════════════════════════════
function exportData() {
  const data = {};
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key.startsWith('hs-') || key === 'hs-blocks' || key === 'hs-streak') {
      data[key] = localStorage.getItem(key);
    }
  }
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `habitstack-backup-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  showToast('Data exported');
}

function importData(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(ev) {
    try {
      const data = JSON.parse(ev.target.result);
      let count = 0;
      for (const [key, val] of Object.entries(data)) {
        if (key.startsWith('hs-') || key === 'hs-blocks' || key === 'hs-streak') {
          localStorage.setItem(key, val);
          count++;
        }
      }
      render();
      showToast(`Imported ${count} entries`);
      haptic('success');
    } catch { showToast('Invalid backup file'); }
  };
  reader.readAsText(file);
  e.target.value = '';
}

// ═══════════════════════════════════════
// MIGRATE
// ═══════════════════════════════════════
(function migrate() {
  const streak = getStreak();
  if (!streak.best) { streak.best = streak.count; saveStreak(streak); }
})();

// ═══════════════════════════════════════
// INIT
// ═══════════════════════════════════════
render();
setInterval(render, 60000);
if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
</script>
